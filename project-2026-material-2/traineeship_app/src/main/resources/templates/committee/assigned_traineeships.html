<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.2.1/css/bootstrap.min.css"
          crossorigin="anonymous">

    <title>Assigned Traineeships</title>
</head>

<body>
<div class="container">

    <h3>Assigned Traineeships (In Progress)</h3>
    <hr>

    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
        <tr>
            <th>Position ID</th>
            <th>Title</th>
            <th>Description</th>
            <th>Student</th>
            <th>Professor</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="position : ${positions}">
            <td th:text="${position.id}">1</td>
            <td th:text="${position.title}">Title</td>
            <td th:text="${position.description}">Description</td>
            <td th:text="${position.student != null ? position.student.username : '-'}">student</td>
            <td th:text="${position.supervisor != null ? position.supervisor.username : 'Not assigned'}">professor</td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/committee/dashboard}">Back to Committee Dashboard</a>

</div>
</body>
</html>
